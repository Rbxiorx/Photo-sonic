<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonicChat Pro - Fast Mode</title>
    <style>
        * { box-sizing: border-box; }
        body { font-family: sans-serif; background: #0b141a; color: #e9edef; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        header { background: #202c33; padding: 15px; text-align: center; font-weight: bold; color: #00a884; border-bottom: 1px solid #3b4a54; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-image: radial-gradient(#202c33 1px, transparent 1px); background-size: 20px 20px; }
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 16px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .sent { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }
        .channel-bar { background: #182229; padding: 8px; display: flex; justify-content: center; align-items: center; gap: 10px; border-top: 1px solid #3b4a54; }
        .channel-bar input { background: #2a3942; border: 1px solid #00a884; color: white; border-radius: 5px; width: 60px; text-align: center; outline: none; }
        .input-area { background: #202c33; padding: 12px; display: flex; align-items: center; gap: 10px; }
        input[type="text"] { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; }
        button { background: #00a884; border: none; width: 48px; height: 48px; border-radius: 50%; color: #0b141a; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #btnCalibrate { background: #3b4a54; width: 40px; height: 40px; color: white; }
        .status-bar { font-size: 11px; background: #182229; padding: 4px; text-align: center; color: #8696a0; }
    </style>
</head>
<body>

<header>SonicChat ULTRA-FAST</header>
<div class="status-bar" id="micStatus">Mode Rapide Activé (Style Ggwave)</div>

<div id="chat-window">
    <div class="bubble received">Protocole haute vitesse prêt.<br>Vitesse : ~15 car/sec.</div>
</div>

<div class="channel-bar">
    <label style="color: #8696a0;">Canal :</label>
    <input type="number" id="freqOffsetInput" value="0" onchange="updateOffset()">
    <span style="color: #00a884;">Hz</span>
</div>

<div class="input-area">
    <button id="btnCalibrate" onclick="calibrate()">📍</button>
    <input type="text" id="inputText" placeholder="Message ultra-rapide..." autocomplete="off">
    <button onclick="sendSound()">🚀</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let analyser, dataArray, bufferLength;
    let isListening = false, isSending = false;
    let dynamicThreshold = 45;
    
    // --- PARAMÈTRES "FAST MODE" (Type ggwave) ---
    let FREQ_OFFSET = 0;
    const STEP_FREQ = 40;     // Plus serré pour plus de précision
    const CHAR_DURATION = 0.06; // 60ms au lieu de 200ms (VITESSE GG WAVE)
    const GAP_DURATION = 0.02;  // Pause quasi inexistante
    const BASE_DATA_FREQ = 2000; // Plus haut pour éviter les interférences

    const micStatus = document.getElementById('micStatus');

    function updateOffset() { FREQ_OFFSET = parseInt(document.getElementById('freqOffsetInput').value) || 0; }

    function playTone(freq, startTime, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.5, startTime + 0.01); 
        gain.gain.linearRampToValueAtTime(0, startTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(startTime); osc.stop(startTime + duration);
    }

    function sendSound() {
        const input = document.getElementById('inputText');
        const text = input.value.trim();
        if (!text || isSending) return;

        isSending = true; 
        addMessage(text, 'sent');
        input.value = '';

        let time = audioCtx.currentTime + 0.05;
        
        // Signal DEBUT (1600Hz)
        playTone(1600 + FREQ_OFFSET, time, CHAR_DURATION);
        time += CHAR_DURATION + GAP_DURATION;

        // Transmission éclair
        for (let char of text) {
            const freq = (BASE_DATA_FREQ + FREQ_OFFSET) + (char.charCodeAt(0) * STEP_FREQ);
            playTone(freq, time, CHAR_DURATION);
            time += CHAR_DURATION + GAP_DURATION;
        }

        // Signal FIN (1500Hz)
        playTone(1500 + FREQ_OFFSET, time, CHAR_DURATION);

        setTimeout(() => { isSending = false; }, (time - audioCtx.currentTime) * 1000);
    }

    async function startListening() {
        if(isListening) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096; // Plus petit pour être plus réactif à la vitesse
            source.connect(analyser);
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            let currentWord = "", lastCharTime = 0, gateOpen = false;

            function process() {
                if (isSending) { requestAnimationFrame(process); return; }
                analyser.getByteFrequencyData(dataArray);
                let highVal = 0, highIdx = -1;

                for (let i = 100; i < bufferLength; i++) {
                    if (dataArray[i] > highVal && dataArray[i] > dynamicThreshold) {
                        highVal = dataArray[i]; highIdx = i;
                    }
                }

                if (highIdx > -1) {
                    const freq = highIdx * (audioCtx.sampleRate / 2) / bufferLength;
                    const now = Date.now();

                    // Détection DEBUT (1600Hz)
                    if (!gateOpen && Math.abs(freq - (1600 + FREQ_OFFSET)) < 25) {
                        gateOpen = true; lastCharTime = now;
                    } 
                    // Détection FIN (1500Hz)
                    else if (gateOpen && Math.abs(freq - (1500 + FREQ_OFFSET)) < 25) {
                        if (now - lastCharTime > 100) {
                            if (currentWord) addMessage(currentWord, 'received');
                            currentWord = ""; gateOpen = false;
                        }
                    }
                    // Détection LETTRES ULTRA-RAPIDE
                    else if (gateOpen && freq >= (BASE_DATA_FREQ + FREQ_OFFSET - 15)) {
                        const code = Math.round((freq - (BASE_DATA_FREQ + FREQ_OFFSET)) / STEP_FREQ);
                        if (code >= 32 && code <= 126) {
                            // On réduit le temps de garde à 50ms pour capter le débit rapide
                            if (now - lastCharTime > 55) { 
                                currentWord += String.fromCharCode(code);
                                lastCharTime = now;
                            }
                        }
                    }
                }
                requestAnimationFrame(process);
            }
            process(); isListening = true;
        } catch (err) { console.error(err); }
    }

    function calibrate() {
        let maxNoise = 0;
        const check = () => {
            analyser.getByteFrequencyData(dataArray);
            for (let v of dataArray) if(v > maxNoise) maxNoise = v;
        };
        let start = Date.now();
        const loop = () => {
            check();
            if(Date.now() - start < 1000) requestAnimationFrame(loop);
            else { dynamicThreshold = maxNoise + 10; micStatus.innerText = "Seuil: " + dynamicThreshold; }
        };
        loop();
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.body.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startListening();
    }, { once: false });
</script>
</body>
</html>
