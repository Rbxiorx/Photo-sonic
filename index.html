<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONIC-SCAN BINARY 6.0</title>
    <style>
        body { font-family: monospace; background: #000; color: #0f0; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        canvas { border: 2px solid #0f0; width: 300px; height: 300px; background: #050505; image-rendering: pixelated; margin: 20px auto; }
        .controls { background: #111; padding: 20px; border-top: 1px solid #0f0; }
        button { background: #002200; color: #0f0; border: 1px solid #0f0; padding: 15px; width: 100%; font-weight: bold; cursor: pointer; margin-bottom: 10px; }
        #status { font-size: 12px; text-align: center; color: #fff; min-height: 20px; }
        .binary-log { font-size: 8px; color: #004400; overflow: hidden; height: 40px; text-align: center; }
    </style>
</head>
<body>

<div id="status">SYSTÈME BINAIRE PRÊT</div>
<canvas id="mainCanvas"></canvas>
<div class="binary-log" id="log">01010100110101...</div>

<div class="controls">
    <input type="file" id="f" accept="image/*" onchange="loadImg(event)" style="display:none">
    <button onclick="document.getElementById('f').click()">📁 CHARGER L'IMAGE</button>
    <button id="btnRadar" onclick="startMic()">📡 ACTIVER RÉCEPTION</button>
    <button id="btnSend" onclick="send()" style="display:none; background:#040;">🚀 ENVOYER (0/1)</button>
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d');
const size = 32; // On utilise une base 2 pour le numérique
canvas.width = size; canvas.height = size;

const F_SYNC = 500;  // Top départ pixel
const F_ZERO = 1000; // Bit 0
const F_ONE = 2000;  // Bit 1
const BIT_DUR = 0.02; // Très rapide car numérique

function loadImg(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        const img = new Image();
        img.onload = () => {
            ctx.drawImage(img, 0, 0, size, size);
            document.getElementById('btnSend').style.display = "block";
        };
        img.src = ev.target.result;
    };
    r.readAsDataURL(e.target.files[0]);
}

async function startMic() {
    await audioCtx.resume();
    const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false, noiseSuppression: false } });
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 1024;
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);

    let x = 0, y = 0, bits = "";

    function loop() {
        analyser.getByteFrequencyData(data);
        let maxV = 0, maxFIdx = 0;
        for(let i=0; i<data.length; i++) { if(data[i] > maxV) { maxV = data[i]; maxFIdx = i; } }
        const freq = maxFIdx * (audioCtx.sampleRate / 2) / data.length;

        if (maxV > 120) {
            if (Math.abs(freq - F_SYNC) < 100) { bits = ""; } // Reset pour nouveau pixel
            else if (Math.abs(freq - F_ZERO) < 100) { bits += "0"; checkPixel(); }
            else if (Math.abs(freq - F_ONE) < 100) { bits += "1"; checkPixel(); }
        }

        function checkPixel() {
            // Ici, on pourrait envoyer 8 bits par couleur, mais pour rester simple
            // on va envoyer 1 bit pour Noir/Blanc ou 3 bits pour Couleur Simple
            if (bits.length === 3) { // Mode 3 bits (R, G, B)
                let r = bits[0] === "1" ? 255 : 0;
                let g = bits[1] === "1" ? 255 : 0;
                let b = bits[2] === "1" ? 255 : 0;
                ctx.fillStyle = `rgb(${r},${g},${b})`;
                ctx.fillRect(x, y, 1, 1);
                document.getElementById('log').innerText += bits;
                x++; if(x >= size){ x=0; y++; }
                bits = "";
            }
        }
        requestAnimationFrame(loop);
    }
    loop();
}

function send() {
    const pixels = ctx.getImageData(0, 0, size, size).data;
    let now = audioCtx.currentTime + 0.1;

    for (let i = 0; i < pixels.length; i += 4) {
        // Sync pixel
        play(F_SYNC, now, 0.01); now += 0.02;
        // Bit Rouge
        play(pixels[i] > 128 ? F_ONE : F_ZERO, now, BIT_DUR); now += BIT_DUR + 0.01;
        // Bit Vert
        play(pixels[i+1] > 128 ? F_ONE : F_ZERO, now, BIT_DUR); now += BIT_DUR + 0.01;
        // Bit Bleu
        play(pixels[i+2] > 128 ? F_ONE : F_ZERO, now, BIT_DUR); now += BIT_DUR + 0.01;
    }
}

function play(f, s, d) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(f, s);
    g.gain.setValueAtTime(0, s);
    g.gain.linearRampToValueAtTime(0.5, s + 0.005);
    g.gain.linearRampToValueAtTime(0, s + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(s); o.stop(s + d);
}
</script>
</body>
</html>
