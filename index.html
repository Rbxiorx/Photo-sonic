<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SONIC-SCAN DIRECT</title>
    <style>
        body { font-family: monospace; background: #000; color: #00ff00; margin: 0; overflow: hidden; }
        #viewport { display: flex; flex-direction: column; align-items: center; padding: 10px; }
        canvas { border: 2px solid #00ff00; width: 300px; height: 300px; background: #050505; image-rendering: pixelated; }
        #vis { width: 100%; height: 50px; background: #000; }
        .controls { padding: 10px; background: #111; border-top: 1px solid #004400; position: fixed; bottom: 0; width: 100%; }
        button { background: #002200; color: #00ff00; border: 1px solid #00ff00; padding: 10px; margin: 2px; flex: 1; font-weight: bold; }
        .ui-row { display: flex; gap: 5px; margin-bottom: 5px; }
        #status { font-size: 10px; text-align: center; margin: 5px; color: #ffff00; }
    </style>
</head>
<body>

<div id="viewport">
    <canvas id="mainCanvas"></canvas>
    <div id="status">ATTENTE...</div>
    <canvas id="vis"></canvas>
</div>

<div class="controls">
    <div class="ui-row">
        <select id="res" onchange="initCanvas()" style="background:#000; color:#0f0; border:1px solid #0f0; flex:1;">
            <option value="20">20x20 (Rapide)</option>
            <option value="40" selected>40x40 (Moyen)</option>
            <option value="60">60x60 (Lent)</option>
        </select>
        <button onclick="document.getElementById('f').click()">📁 IMAGE</button>
    </div>
    <div class="ui-row">
        <button id="btnRadar" onclick="startMic()">📡 ACTIVER RÉCEPTION</button>
        <button id="btnSend" onclick="send()" style="display:none; background:#004400;">🚀 ENVOYER</button>
        <button onclick="location.reload()">🔄 RESET</button>
    </div>
    <input type="file" id="f" accept="image/*" onchange="loadImg(event)" style="display:none">
</div>

<script>
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
const canvas = document.getElementById('mainCanvas');
const ctx = canvas.getContext('2d', {alpha: false});
const vCanvas = document.getElementById('vis');
const vCtx = vCanvas.getContext('2d');

let size = 40;
let sourceImg = null;
let isRx = false;
const F_START = 18000; // Fréquence de base
const F_SYNC = 17500;  // Fréquence de synchro ligne
const STEP = 30; 
const DUR = 0.04; // Durée par pixel

function initCanvas() {
    size = parseInt(document.getElementById('res').value);
    canvas.width = size; canvas.height = size;
    ctx.fillStyle = "#000"; ctx.fillRect(0,0,size,size);
}
initCanvas();

function loadImg(e) {
    const r = new FileReader();
    r.onload = (ev) => {
        sourceImg = new Image();
        sourceImg.onload = () => {
            ctx.drawImage(sourceImg, 0, 0, size, size);
            document.getElementById('btnSend').style.display = "block";
            document.getElementById('status').innerText = "IMAGE PRÊTE. TEMPS: " + (size*size*DUR).toFixed(0) + "s";
        };
        sourceImg.src = ev.target.result;
    };
    r.readAsDataURL(e.target.files[0]);
}

// CONFIGURATION MICRO SANS RESTRICTIONS
async function startMic() {
    await audioCtx.resume();
    const stream = await navigator.mediaDevices.getUserMedia({ 
        audio: { 
            echoCancellation: false, 
            noiseSuppression: false, 
            autoGainControl: false 
        } 
    });
    
    const source = audioCtx.createMediaStreamSource(stream);
    const analyser = audioCtx.createAnalyser();
    analyser.fftSize = 4096; // Haute résolution pour détecter les fréquences
    source.connect(analyser);
    const data = new Uint8Array(analyser.frequencyBinCount);
    
    document.getElementById('btnRadar').innerText = "📡 RÉCEPTION ACTIVE";
    document.getElementById('status').innerText = "À L'ÉCOUTE...";

    let x = 0, y = 0;

    function loop() {
        analyser.getByteFrequencyData(data);
        
        // Visualizer
        vCanvas.width = vCanvas.clientWidth;
        vCtx.fillStyle="#000"; vCtx.fillRect(0,0,vCanvas.width, 50);
        vCtx.fillStyle="#0f0";
        for(let i=0; i<100; i++) vCtx.fillRect(i*(vCanvas.width/100), 50, 2, -data[i+500]/4);

        // Détection Fréquence Dominante
        let maxV = 0, maxF = 0;
        for(let i=0; i<data.length; i++) {
            if(data[i] > maxV) { maxV = data[i]; maxF = i; }
        }
        
        const freq = maxF * (audioCtx.sampleRate / 2) / data.length;

        if (maxV > 80) { // Sensibilité
            // Détection Synchro Ligne (ou début)
            if (Math.abs(freq - F_SYNC) < 50) {
                isRx = true;
                if(x >= size-1) { x=0; y++; } 
            } 
            // Détection Pixel
            else if (isRx && freq >= F_START && freq < 22000) {
                const val = Math.round((freq - F_START) / STEP);
                ctx.fillStyle = `rgb(${val},${val},${val})`;
                ctx.fillRect(x, y, 1, 1);
                x++;
                if(x >= size) { x = 0; y++; }
                if(y >= size) { isRx = false; x=0; y=0; }
            }
        }
        requestAnimationFrame(loop);
    }
    loop();
}

function send() {
    const pixels = ctx.getImageData(0, 0, size, size).data;
    let now = audioCtx.currentTime + 0.1;

    // Sourdine micro pendant envoi
    document.getElementById('status').innerText = "ÉMISSION EN DIRECT...";
    
    for (let y = 0; y < size; y++) {
        // Un bip de synchro au début de chaque ligne
        play(F_SYNC, now, 0.05);
        now += 0.06;

        for (let x = 0; x < size; x++) {
            const i = (y * size + x) * 4;
            const gray = (pixels[i] + pixels[i+1] + pixels[i+2]) / 3;
            play(F_START + (gray * STEP), now, DUR - 0.01);
            now += DUR;
        }
    }
}

function play(f, s, d) {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.frequency.setValueAtTime(f, s);
    g.gain.setValueAtTime(0, s);
    g.gain.linearRampToValueAtTime(0.5, s + 0.005);
    g.gain.linearRampToValueAtTime(0, s + d);
    o.connect(g); g.connect(audioCtx.destination);
    o.start(s); o.stop(s + d);
}
</script>
</body>
</html>
