<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>SonicChat Pro - Turbo</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0b141a; color: #e9edef; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* BARRE DE SPECTRE ORANGE/VERTE */
        #visualizer-container { width: 100%; height: 3px; background: #182229; position: fixed; top: 0; z-index: 100; }
        #visualizer-bar { height: 100%; width: 0%; background: linear-gradient(to right, #00a884, orange); transition: width 0.05s; }

        header { 
            background: #202c33; 
            padding: calc(env(safe-area-inset-top) + 10px) 15px 10px 15px; 
            text-align: center; font-weight: bold; color: #00a884; border-bottom: 1px solid #3b4a54; 
        }

        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 12px; background-image: radial-gradient(#202c33 1px, transparent 1px); background-size: 20px 20px; }
        
        .bubble { max-width: 80%; padding: 10px 15px; border-radius: 15px; font-size: 16px; animation: fadeIn 0.2s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .sent { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }

        .channel-bar { background: #182229; padding: 5px; display: flex; justify-content: center; align-items: center; gap: 10px; border-top: 1px solid #3b4a54; font-size: 12px; }
        .channel-bar input { background: #2a3942; border: 1px solid #00a884; color: white; border-radius: 5px; width: 50px; text-align: center; outline: none; }
        
        .input-area { 
            background: #202c33; 
            padding: 10px 15px calc(env(safe-area-inset-bottom) + 10px) 15px; 
            display: flex; align-items: center; gap: 10px; 
        }

        input[type="text"] { flex: 1; background: #2a3942; border: none; padding: 12px; border-radius: 25px; color: white; outline: none; font-size: 16px; }
        button { background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: #0b141a; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        #btnCalibrate { background: #3b4a54; width: 35px; height: 35px; color: white; }
        .status-bar { font-size: 11px; background: #182229; padding: 4px; text-align: center; color: #8696a0; }
    </style>
</head>
<body>

<div id="visualizer-container"><div id="visualizer-bar"></div></div>
<header>SonicChat TURBO</header>
<div class="status-bar" id="micStatus">Mode Ultra-Rapide (Filtre Echo Actif)</div>

<div id="chat-window"></div>

<div class="channel-bar">
    <label>Canal :</label>
    <input type="number" id="freqOffsetInput" value="0" onchange="updateOffset()"> Hz
</div>

<div class="input-area">
    <button id="btnCalibrate" onclick="calibrate()">📍</button>
    <input type="text" id="inputText" placeholder="Message rapide..." autocomplete="off">
    <button onclick="sendSound()">🚀</button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let analyser, dataArray;
    let isListening = false, isSending = false;
    let dynamicThreshold = 45;
    
    // --- RÉGLAGES TURBO (15 lettres/sec) ---
    let FREQ_OFFSET = 0;
    const STEP_FREQ = 40;
    const CHAR_DURATION = 0.06; // Vitesse Max
    const GAP_DURATION = 0.02;  // Pause minimum
    const BASE_DATA_FREQ = 2000;

    const volBar = document.getElementById('visualizer-bar');

    function updateOffset() { FREQ_OFFSET = parseInt(document.getElementById('freqOffsetInput').value) || 0; }

    function playTone(freq, startTime, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(freq, startTime);
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.5, startTime + 0.01); 
        gain.gain.linearRampToValueAtTime(0, startTime + duration);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(startTime); osc.stop(startTime + duration);
    }

    function sendSound() {
        const input = document.getElementById('inputText');
        const text = input.value.trim();
        if (!text || isSending) return;
        isSending = true; 
        addMessage(text, 'sent');
        input.value = '';
        let time = audioCtx.currentTime + 0.05;
        playTone(1600 + FREQ_OFFSET, time, CHAR_DURATION); // START
        time += CHAR_DURATION + GAP_DURATION;
        for (let char of text) {
            const freq = (BASE_DATA_FREQ + FREQ_OFFSET) + (char.charCodeAt(0) * STEP_FREQ);
            playTone(freq, time, CHAR_DURATION);
            time += CHAR_DURATION + GAP_DURATION;
        }
        playTone(1500 + FREQ_OFFSET, time, CHAR_DURATION); // END
        setTimeout(() => { isSending = false; }, (time - audioCtx.currentTime) * 1000);
    }

    async function startListening() {
        if(isListening) return;
        const stream = await navigator.mediaDevices.getUserMedia({ audio: { echoCancellation: false } });
        const source = audioCtx.createMediaStreamSource(stream);
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 2048; 
        source.connect(analyser);
        dataArray = new Uint8Array(analyser.frequencyBinCount);
        
        let currentWord = "", lastCharTime = 0, gateOpen = false;
        let lastCode = -1; // --- FILTRE ANTI-DOUBLON ---

        function process() {
            analyser.getByteFrequencyData(dataArray);
            
            // Barre Orange/Verte réactive
            let sum = 0; for(let i=0; i<50; i++) sum += dataArray[i];
            volBar.style.width = (sum / 50) + "%";

            if (!isSending) {
                let highVal = 0, highIdx = -1;
                for (let i = 80; i < dataArray.length; i++) {
                    if (dataArray[i] > highVal && dataArray[i] > dynamicThreshold) {
                        highVal = dataArray[i]; highIdx = i;
                    }
                }

                if (highIdx > -1) {
                    const freq = highIdx * (audioCtx.sampleRate / 2) / dataArray.length;
                    const now = Date.now();

                    if (!gateOpen && Math.abs(freq - (1600 + FREQ_OFFSET)) < 30) {
                        gateOpen = true; lastCharTime = now; lastCode = -1;
                    } 
                    else if (gateOpen && Math.abs(freq - (1500 + FREQ_OFFSET)) < 30) {
                        if (currentWord) addMessage(currentWord, 'received');
                        currentWord = ""; gateOpen = false;
                    }
                    else if (gateOpen && freq >= (BASE_DATA_FREQ + FREQ_OFFSET - 10)) {
                        const code = Math.round((freq - (BASE_DATA_FREQ + FREQ_OFFSET)) / STEP_FREQ);
                        // --- LOGIQUE ANTI-DOUBLON ---
                        // On n'accepte la lettre que si le code a changé OU si assez de temps a passé
                        if (code >= 32 && code <= 126) {
                            if (code !== lastCode && (now - lastCharTime > 40)) {
                                currentWord += String.fromCharCode(code);
                                lastCharTime = now;
                                lastCode = code;
                            }
                        }
                    }
                } else {
                    lastCode = -1; // Reset sur le silence
                }
            }
            requestAnimationFrame(process);
        }
        process(); isListening = true;
    }

    function calibrate() {
        let maxNoise = 0;
        let start = Date.now();
        const loop = () => {
            analyser.getByteFrequencyData(dataArray);
            for (let v of dataArray) if(v > maxNoise) maxNoise = v;
            if(Date.now() - start < 1000) requestAnimationFrame(loop);
            else { dynamicThreshold = maxNoise + 10; document.getElementById('micStatus').innerText = "Seuil: " + dynamicThreshold; }
        };
        loop();
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        const win = document.getElementById('chat-window');
        win.appendChild(div);
        win.scrollTop = win.scrollHeight;
    }

    document.body.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        startListening();
    }, { once: true });
</script>
</body>
</html>
