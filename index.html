<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SonicChat Pro - Ultra Fast</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #0b141a; 
            color: #e9edef; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden;
        }
        header { 
            background: #202c33; 
            padding: 15px; 
            text-align: center; 
            font-weight: bold; 
            color: #00a884;
            border-bottom: 1px solid #3b4a54;
            z-index: 10;
        }
        #chat-window { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            gap: 12px;
            background-image: radial-gradient(#202c33 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .bubble { 
            max-width: 80%; 
            padding: 10px 15px; 
            border-radius: 15px; 
            font-size: 16px; 
            line-height: 1.4;
            word-wrap: break-word;
            animation: fadeIn 0.2s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
        .sent { align-self: flex-end; background: #005c4b; border-bottom-right-radius: 2px; }
        .received { align-self: flex-start; background: #202c33; border-bottom-left-radius: 2px; }
        .channel-bar {
            background: #182229;
            padding: 5px 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            border-top: 1px solid #3b4a54;
            font-size: 13px;
        }
        .channel-bar input {
            background: #2a3942;
            border: 1px solid #00a884;
            color: white;
            border-radius: 5px;
            width: 60px;
            text-align: center;
            padding: 2px;
            outline: none;
        }
        .input-area { 
            background: #202c33; 
            padding: 12px 15px; 
            display: flex; 
            align-items: center; 
            gap: 10px;
        }
        input[type="text"] { 
            flex: 1; 
            background: #2a3942; 
            border: none; 
            padding: 12px 18px; 
            border-radius: 25px; 
            color: white; 
            outline: none;
            font-size: 16px;
        }
        button { 
            background: #00a884; border: none; width: 48px; height: 48px; border-radius: 50%; color: #0b141a; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; 
        }
        #btnCalibrate { background: #3b4a54; width: 40px; height: 40px; color: white; }
        .status-bar { font-size: 12px; background: #182229; padding: 6px; text-align: center; color: #8696a0; }
        #visualizer { width: 100%; height: 3px; background: transparent; transition: background 0.05s; }
    </style>
</head>
<body>

<header>SonicChat Pro ⚡ Speed</header>
<div class="status-bar" id="micStatus">Cliquez pour activer</div>
<div id="visualizer"></div>

<div id="chat-window">
    <div class="bubble received">Mode Haute Vitesse activé (80ms/caractère).</div>
</div>

<div class="channel-bar">
    <label style="color: #8696a0;">Canal :</label>
    <input type="number" id="freqOffsetInput" value="0" onchange="updateOffset()">
    <span style="color: #00a884; font-weight: bold;">Hz</span>
</div>

<div class="input-area">
    <button id="btnCalibrate" onclick="calibrate()">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor"><path d="M12 9.5a2.5 2.5 0 0 1 0 5 2.5 2.5 0 0 1 0-5m0-2a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9m0-6a1 1 0 0 1 1 1v2.07a8.001 8.001 0 0 1 7.93 7.93H23a1 1 0 1 1 0 2h-2.07a8.001 8.001 0 0 1-7.93 7.93V23a1 1 0 1 1-2 0v-2.07a8.001 8.001 0 0 1-7.93-7.93H1a1 1 0 1 1 0-2h2.07a8.001 8.001 0 0 1 7.93-7.93V2a1 1 0 0 1 1-1z"/></svg>
    </button>
    <input type="text" id="inputText" placeholder="Message ultra-rapide..." autocomplete="off">
    <button onclick="sendSound()">
        <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
            <path d="M1.101 21.757L23.8 12.028 1.101 2.3l.011 7.912 13.623 1.816-13.623 1.817-.011 7.912z"></path>
        </svg>
    </button>
</div>

<script>
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    let analyser, dataArray, bufferLength;
    let isListening = false, isSending = false, isCalibrating = false;
    let dynamicThreshold = 40;
    
    let FREQ_OFFSET = 0;
    const STEP_FREQ = 40;  // Réduit pour plus de précision à haute vitesse
    const CHAR_DURATION = 0.08; // 80ms : Très rapide !
    const RAMP_TIME = 0.01;

    const chatWindow = document.getElementById('chat-window');
    const micStatus = document.getElementById('micStatus');
    const visualizer = document.getElementById('visualizer');

    function updateOffset() {
        FREQ_OFFSET = parseInt(document.getElementById('freqOffsetInput').value) || 0;
        micStatus.innerText = "Canal : " + FREQ_OFFSET + " Hz";
    }

    function playTone(freq, startTime, duration) {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = 'sine';
        osc.frequency.setValueAtTime(freq, startTime);
        
        // Enveloppe ultra-courte pour éviter les "clics" mais rester rapide
        gain.gain.setValueAtTime(0, startTime);
        gain.gain.linearRampToValueAtTime(0.5, startTime + RAMP_TIME);
        gain.gain.setValueAtTime(0.5, startTime + duration - RAMP_TIME);
        gain.gain.linearRampToValueAtTime(0, startTime + duration);
        
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        osc.start(startTime);
        osc.stop(startTime + duration);
    }

    function sendSound() {
        const input = document.getElementById('inputText');
        const text = input.value.trim();
        if (!text || isSending) return;

        isSending = true; 
        addMessage(text, 'sent');
        input.value = '';
        micStatus.innerText = "⚡ Transmission...";

        let time = audioCtx.currentTime + 0.05;
        
        // Start Tone (plus court)
        playTone(1500 + FREQ_OFFSET, time, CHAR_DURATION);
        time += CHAR_DURATION;

        // Data Tones (S'enchaînent directement)
        text.split('').forEach(char => {
            const freq = (2000 + FREQ_OFFSET) + (char.charCodeAt(0) * STEP_FREQ);
            playTone(freq, time, CHAR_DURATION);
            time += CHAR_DURATION; 
        });

        // End Tone
        playTone(1400 + FREQ_OFFSET, time, CHAR_DURATION);

        setTimeout(() => { 
            isSending = false; 
            micStatus.innerText = "🎤 Écoute";
        }, (time - audioCtx.currentTime) * 1000 + 200);
    }

    async function startListening() {
        if(isListening) return;
        try {
            const stream = await navigator.mediaDevices.getUserMedia({ 
                audio: { echoCancellation: false, noiseSuppression: false, autoGainControl: false } 
            });
            const source = audioCtx.createMediaStreamSource(stream);
            analyser = audioCtx.createAnalyser();
            analyser.fftSize = 4096; // FFT plus petite pour être plus réactif dans le temps
            source.connect(analyser);
            bufferLength = analyser.frequencyBinCount;
            dataArray = new Uint8Array(bufferLength);
            
            let currentWord = "", lastCharTime = 0, gateOpen = false, lastCode = -1;

            function process() {
                if (isSending || isCalibrating) { 
                    visualizer.style.background = "transparent";
                    requestAnimationFrame(process); return; 
                }

                analyser.getByteFrequencyData(dataArray);
                let highVal = 0, highIdx = -1;
                const minBin = Math.floor((1300 + FREQ_OFFSET) / (audioCtx.sampleRate / analyser.fftSize));
                
                for (let i = minBin; i < bufferLength; i++) {
                    if (dataArray[i] > highVal && dataArray[i] > dynamicThreshold) {
                        highVal = dataArray[i]; highIdx = i;
                    }
                }

                visualizer.style.background = highVal > dynamicThreshold ? (gateOpen ? "#00a884" : "#ffbc00") : "transparent";

                if (highIdx > -1) {
                    const freq = highIdx * (audioCtx.sampleRate / 2) / bufferLength;
                    const now = Date.now();

                    // 1. Détection Start
                    if (!gateOpen && Math.abs(freq - (1500 + FREQ_OFFSET)) < 30) {
                        gateOpen = true; 
                        lastCharTime = now;
                        currentWord = "";
                        micStatus.innerText = "🔓 Synchro";
                    } 
                    // 2. Détection End
                    else if (gateOpen && Math.abs(freq - (1400 + FREQ_OFFSET)) < 30) {
                        if (now - lastCharTime > (CHAR_DURATION * 500)) {
                            if (currentWord) addMessage(currentWord, 'received');
                            gateOpen = false;
                            micStatus.innerText = "🎤 Écoute";
                        }
                    }
                    // 3. Détection Caractères
                    else if (gateOpen && freq >= (2000 + FREQ_OFFSET - 20)) {
                        const code = Math.round((freq - (2000 + FREQ_OFFSET)) / STEP_FREQ);
                        // Protection contre les doublons trop rapides
                        if (code >= 32 && code <= 255) {
                            if (now - lastCharTime > (CHAR_DURATION * 800)) { // 80% de la durée pour valider
                                currentWord += String.fromCharCode(code);
                                lastCharTime = now;
                            }
                        }
                    }
                }
                
                // Timeout si signal perdu
                if (gateOpen && Date.now() - lastCharTime > 2000) {
                    gateOpen = false;
                    micStatus.innerText = "🎤 Écoute";
                }

                requestAnimationFrame(process);
            }
            process(); isListening = true;
            micStatus.innerText = "🎤 Écoute active";
        } catch (err) { micStatus.innerText = "⚠️ Erreur micro"; }
    }

    function calibrate() {
        if (!isListening) { startListening(); return; }
        isCalibrating = true;
        micStatus.innerText = "⏳ Silence...";
        let maxNoise = 0, startTime = Date.now();
        const check = () => {
            analyser.getByteFrequencyData(dataArray);
            const startBin = Math.floor((1300 + FREQ_OFFSET) / (audioCtx.sampleRate / analyser.fftSize));
            for (let i = startBin; i < bufferLength; i++) {
                if (dataArray[i] > maxNoise) maxNoise = dataArray[i];
            }
            if (Date.now() - startTime < 1500) requestAnimationFrame(check);
            else {
                dynamicThreshold = Math.max(35, maxNoise + 10);
                isCalibrating = false;
                micStatus.innerText = "✅ Prêt (" + Math.round(dynamicThreshold) + ")";
                setTimeout(() => micStatus.innerText = "🎤 Écoute", 1500);
            }
        };
        check();
    }

    function addMessage(text, type) {
        const div = document.createElement('div');
        div.className = `bubble ${type}`;
        div.innerText = text;
        chatWindow.appendChild(div);
        chatWindow.scrollTop = chatWindow.scrollHeight;
    }

    document.body.addEventListener('click', () => {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        if (!isListening) startListening();
    }, { once: false });

    document.getElementById('inputText').addEventListener('keypress', (e) => { 
        if (e.key === 'Enter') sendSound(); 
    });
</script>
</body>
</html>
